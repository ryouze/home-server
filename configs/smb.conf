[global]
    server role = standalone server
    log file = /var/log/samba/log.%m
    max log size = 1000
    logging = file
    panic action = /usr/share/samba/panic-action %d
    load printers = no
    printcap name = /dev/null
    disable spoolss = yes

[data]
    comment = Storage
    path = /srv/storage/data
    read only = no
    valid users = void
    create mask = 0600
    directory mask = 0700
