# /etc/samba/smb.conf

[global]
    # Disable printer share auto-loading
    load printers = no
    # Ignore local printcap data by pointing to a null device
    printcap name = /dev/null
    # Disable Windows printer-spooler RPC support (spoolss)
    disable spoolss = yes

[data]
    # Filesystem path exported by this share
    path = /srv/storage/data
    # Human-readable description shown to clients for this share
    comment = Storage

    # Restrict access to the listed Samba account(s)
    valid users = void
    # Allow write access (no = writable)
    read only = no

    # Default permissions for new files: owner read/write only
    create mask = 0600
    # Default permissions for new directories: owner full access only
    directory mask = 0700
